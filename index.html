<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="https://img.icons8.com/bubbles/1200/flipkart.jpg" alt="Flipkart">
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search for products, brands and more">
        </div>
        <nav class="nav-links">
            <button class="login-btn">Login</button>
            <a href="#">Become a Seller</a>
            <a href="#">More</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <main>
        <section class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product">
                <div class="product-info">
                    <h4>Smartphone Pro Max</h4>
                    <p class="price">₹12,999 <span class="old-price">₹15,000</span></p>
                    <p class="offer">20% off</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product">
                <div class="product-info">
                    <h4>Wireless Headphones</h4>
                    <p class="price">₹1,499 <span class="old-price">₹2,999</span></p>
                    <p class="offer">50% off</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product">
                <div class="product-info">
                    <h4>Smart Watch Series 7</h4>
                    <p class="price">₹2,499 <span class="old-price">₹4,999</span></p>
                    <p class="offer">50% off</p>
                </div>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/150" alt="Product">
                <div class="product-info">
                    <h4>Leather Wallet</h4>
                    <p class="price">₹499 <span class="old-price">₹999</span></p>
                    <p class="offer">50% off</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <div>
                <h5>ABOUT</h5>
                <p>Contact Us</p>
                <p>About Us</p>
            </div>
            <div>
                <h5>HELP</h5>
                <p>Payments</p>
                <p>Shipping</p>
            </div>
        </div>
        <hr>
        <div class="credit">
            Designed by <strong>Ritesh Alone</strong>
        </div>
    </footer>

</body>
</html>
